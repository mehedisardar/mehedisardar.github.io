<!DOCTYPE html>
<html>
<head>
<style>
body {
  background-color: red;
  animation: colorChange 10s infinite;
}

@keyframes colorChange {
  0% {
    background-color: red;
  }
  20% {
    background-color: blue;
  }
  40% {
    background-color: yellow;
  }
  60% {
    background-color: green;
  }
  80% {
    background-color: purple;
  }
  100% {
    background-color: red;
  }
}

h1 {
  position: absolute;
  animation: move 10s linear infinite;
}

@keyframes move {
  0% {
    top: 0px;
    left: 0px;
  }
  25% {
    top: 0px;
    left: calc(100% - 150px);
  }
  50% {
    top: calc(100% - 50px);
    left: calc(100% - 150px);
  }
  75% {
    top: calc(100% - 50px);
    left: 0px;
  }
  100% {
    top: 0px;
    left: 0px;
  }
}
</style>
</head>
<body>

<h1>TEST</h1>


<audio src="./Audio/skibidi.wav" autoplay loop>
  Your browser does not support the audio tag.
</audio>

</body>
</html>
